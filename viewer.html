<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyWithMe - Viewer</title>

    <!-- Meta Tags -->
    <meta
      name="description"
      content="StudyWithMe Viewer Mode"
    />
    <meta name="theme-color" content="#000000" />

    <!-- Fonts & Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="css/live-stream.css" />
    
    <!-- Forced Viewer Mode Styles Inline to ensure they apply immediately -->
    <style>
        body { background: #000; overflow: hidden; }
        .container { display: block !important; width: 100vw; height: 100vh; background: #000; }
        .camera-panel { width: 100% !important; height: 100% !important; border: none; }
        .remote-videos-grid { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
        }
        .remote-video-player { width: 100%; height: 100%; max-width: none; border: none; border-radius: 0; }
        .remote-video-player video { object-fit: cover !important; }
        
        /* Emoji Bar Positioning */
        .camera-controls-overlay {
            position: absolute; bottom: 30px; left: 0; right: 0;
            display: flex; justify-content: center; pointer-events: none;
            z-index: 9999 !important; /* Force top layer */
        }
        .emoji-bar {
            pointer-events: auto; background: rgba(0,0,0,0.5); border-radius: 20px; padding: 5px 10px; display: flex; gap: 8px;
        }
        .emoji-btn { background: none; border: none; font-size: 24px; cursor: pointer; transition: transform 0.2s; }
        .emoji-btn:hover { transform: scale(1.2); }
        
        .reaction-container {
            z-index: 10000 !important; /* Emojis float above everything */
            pointer-events: none;
        }
    </style>

    <!-- Agora SDK -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <script src="https://download.agora.io/sdk/release/agora-rtm-2.2.0.js"></script>
  </head>

  <body class="viewer-mode">
    <div class="container full-live-mode">
      
      <!-- Camera Panel (Full Screen) -->
      <div class="panel camera-panel">
        
        <!-- Remote Videos Container (Host will appear here) -->
        <div id="remoteVideoContainer" class="remote-videos-grid"></div>

        <!-- Emoji Controls -->
        <div class="camera-controls-overlay">
            <div id="emojiBar" class="emoji-bar">
              <button class="emoji-btn" data-emoji="🔥">🔥</button>
              <button class="emoji-btn" data-emoji="👏">👏</button>
              <button class="emoji-btn" data-emoji="💪">💪</button>
              <button class="emoji-btn" data-emoji="💯">💯</button>
              <button class="emoji-btn" data-emoji="✨">✨</button>
            </div>
        </div>

      </div>
      
      <!-- Floating Emoji Container -->
      <div id="reactionContainer" class="reaction-container"></div>
    </div>

    <!-- Scripts -->
    <script type="module" src="script.js"></script>
    <script type="module" src="js/live-manager.js"></script>

  </body>
</html>
