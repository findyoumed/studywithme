<!-- Divider -->
<div style="width: 1px; height: 20px; background: rgba(255, 255, 255, 0.3); margin: 0 5px;"></div>

<button class="ctrl-btn" onclick="toggleLayout()" aria-label="Switch Layout" data-i18n-title="layout"
    data-i18n-label="layout_label">
    <span class="material-symbols-outlined" id="layoutIcon">grid_view</span>
</button>

<!-- About/Help Button -->
<button class="ctrl-btn" onclick="toggleAbout()" aria-label="About & Guide" data-i18n-title="about"
    data-i18n-label="about_label">
    <span class="material-symbols-outlined">help</span>
</button>

<!-- Share Button (Referral) -->
<button class="ctrl-btn" onclick="copyToClipboard()" aria-label="Share" data-i18n-title="share"
    data-i18n-label="share_label">
    <span class="material-symbols-outlined">share</span>
</button>

<!-- Language Toggle -->
<div class="ctrl-btn-group"
    style="display: flex; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 2px; margin-left: 5px;">
    <button id="langKoBtn" class="ctrl-btn"
        style="padding: 4px 8px; font-size: 10px; min-width: 35px; height: auto; background: transparent; border: none; color: white;"
        onclick="changeLanguage('ko')" title="Korean" aria-label="Change language to Korean">KO</button>
    <button id="langEnBtn" class="ctrl-btn"
        style="padding: 4px 8px; font-size: 10px; min-width: 35px; height: auto; background: transparent; border: none; color: #666;"
        onclick="changeLanguage('en')" title="English" aria-label="Change language to English">EN</button>
</div>

<div class="opacity-container" title="Camera Brightness" data-i18n-title="opacity_container">
    <span class="material-symbols-outlined" style="font-size: 18px">brightness_6</span>
    <div class="slider-wrapper">
        <span class="slider-label">○ ── ●</span>
        <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5"
            oninput="updateOpacityFromSlider(this.value)" data-i18n-title="opacity_slider"
            aria-label="Camera Brightness" />
    </div>
</div>

<div class="sensitivity-container" data-i18n-title="sensitivity_container">
    <span class="material-symbols-outlined" style="font-size: 18px">speed</span>
    <div class="slider-wrapper">
        <span class="slider-label">− ── +</span>
        <input type="range" id="sensitivitySlider" min="0" max="100" step="1" value="50"
            oninput="updateSensitivityFromSlider(this.value)" data-i18n-title="sensitivity_slider"
            aria-label="Motion Sensitivity" />
    </div>
</div>
