<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyWithMe - UI Preview</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      overflow-x: hidden;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      gap: 0;
    }

    /* Left Panel - Video */
    .video-panel {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      opacity: 0.3;
    }

    /* Right Panel - Camera */
    .camera-panel {
      background: #0a0a0a;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Camera Header */
    .camera-header {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
    }

    /* Score Display */
    .score-display {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 15px 25px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .score-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-value {
      font-size: 36px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Go Live Button */
    .go-live-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 12px 24px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
    }

    .go-live-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(239, 68, 68, 0.8);
    }

    .go-live-btn .material-symbols-outlined {
      font-size: 24px;
    }

    .go-live-btn.inactive {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    /* Camera Preview */
    .camera-preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }

    .camera-placeholder {
      width: 80%;
      height: 60%;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    /* Mode Switcher */
    .mode-switcher {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 10px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    .mode-btn {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 10px 20px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .mode-btn:hover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.2);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }

    /* Info Box */
    .info-box {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 20px;
      max-width: 350px;
      z-index: 1000;
    }

    .info-box h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .info-box p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .info-box .features {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      background: rgba(102, 126, 234, 0.1);
      border-radius: 8px;
    }

    .feature-item .material-symbols-outlined {
      color: #667eea;
      font-size: 20px;
    }

    .feature-item span {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Viewer Mode Styles */
    .viewer-mode .camera-panel {
      align-items: center;
      justify-content: center;
    }

    .join-share-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 15px 30px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .join-share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    }

    .join-share-btn .material-symbols-outlined {
      font-size: 28px;
    }

    .remote-videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
      max-height: 70%;
      overflow-y: auto;
    }

    .remote-video-box {
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .remote-video-box .nickname {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .camera-header {
        top: 10px;
      }
    }
  </style>
</head>
<body>
  
  <!-- Mode Switcher -->
  <div class="mode-switcher">
    <button class="mode-btn active" onclick="showHostMode()">호스트 모드</button>
    <button class="mode-btn" onclick="showViewerMode()">뷰어 모드</button>
  </div>

  <!-- Info Box -->
  <div class="info-box">
    <h3>✨ UI Preview</h3>
    <p>StudyWithMe의 실제 UI를 미리 확인할 수 있습니다.</p>
    <div class="features">
      <div class="feature-item">
        <span class="material-symbols-outlined">timer</span>
        <span>실시간 SCORE 타이머</span>
      </div>
      <div class="feature-item">
        <span class="material-symbols-outlined">videocam</span>
        <span>카메라 프리뷰</span>
      </div>
      <div class="feature-item">
        <span class="material-symbols-outlined">stop_circle</span>
        <span>라이브 방송 컨트롤</span>
      </div>
      <div class="feature-item">
        <span class="material-symbols-outlined">share</span>
        <span>링크 공유 (뷰어)</span>
      </div>
    </div>
  </div>

  <!-- Host Mode -->
  <div id="hostMode" class="container">
    <!-- Left: Video Panel -->
    <div class="video-panel">
      <div class="video-placeholder">
        <span class="material-symbols-outlined" style="font-size: 120px;">play_circle</span>
      </div>
    </div>

    <!-- Right: Camera Panel -->
    <div class="camera-panel">
      <!-- Camera Header -->
      <div class="camera-header">
        <!-- Score Display -->
        <div class="score-display">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="scoreValue">00:00:00</div>
        </div>

        <!-- Go Live Button -->
        <button class="go-live-btn inactive" onclick="toggleLive(this)">
          <span class="material-symbols-outlined">podcasts</span>
          <span class="btn-text">Go Live</span>
        </button>
      </div>

      <!-- Camera Preview -->
      <div class="camera-preview">
        <div class="camera-placeholder">
          <span class="material-symbols-outlined" style="font-size: 64px;">videocam</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Viewer Mode (Hidden by default) -->
  <div id="viewerMode" class="container viewer-mode" style="display: none;">
    <!-- Left: Host Video -->
    <div class="video-panel">
      <div class="video-placeholder">
        <span class="material-symbols-outlined" style="font-size: 120px;">person</span>
      </div>
      <!-- Host Score Display -->
      <div style="position: absolute; top: 20px; left: 20px;">
        <div class="score-display">
          <div class="score-label">HOST SCORE</div>
          <div class="score-value">00:42:15</div>
        </div>
      </div>
    </div>

    <!-- Right: Remote Videos + Share Button -->
    <div class="camera-panel">
      <div class="remote-videos">
        <div class="remote-video-box">
          <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.3;">person</span>
          <div class="nickname">User 1</div>
        </div>
        <div class="remote-video-box">
          <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.3;">person</span>
          <div class="nickname">User 2</div>
        </div>
      </div>
      
      <!-- Join & Share Button -->
      <div style="padding: 20px; display: flex; justify-content: center;">
        <button class="join-share-btn" onclick="copyLink()">
          <span class="material-symbols-outlined">share</span>
          <span>Join & Share</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Score Timer
    let seconds = 0;
    setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      const scoreEl = document.getElementById('scoreValue');
      if (scoreEl) {
        scoreEl.textContent = `${h}:${m}:${s}`;
      }
    }, 1000);

    // Toggle Live
    function toggleLive(btn) {
      const isLive = btn.classList.contains('inactive');
      
      if (isLive) {
        btn.classList.remove('inactive');
        btn.querySelector('.material-symbols-outlined').textContent = 'stop_circle';
        btn.querySelector('.btn-text').textContent = 'Stop Live';
      } else {
        btn.classList.add('inactive');
        btn.querySelector('.material-symbols-outlined').textContent = 'podcasts';
        btn.querySelector('.btn-text').textContent = 'Go Live';
      }
    }

    // Copy Link
    function copyLink() {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target.closest('.join-share-btn');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span><span>Copied!</span>';
        btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
        
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }, 2000);
      });
    }

    // Mode Switcher
    function showHostMode() {
      document.getElementById('hostMode').style.display = 'grid';
      document.getElementById('viewerMode').style.display = 'none';
      document.querySelectorAll('.mode-btn')[0].classList.add('active');
      document.querySelectorAll('.mode-btn')[1].classList.remove('active');
    }

    function showViewerMode() {
      document.getElementById('hostMode').style.display = 'none';
      document.getElementById('viewerMode').style.display = 'grid';
      document.querySelectorAll('.mode-btn')[0].classList.remove('active');
      document.querySelectorAll('.mode-btn')[1].classList.add('active');
    }
  </script>

</body>
</html>
