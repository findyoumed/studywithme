  <style>
    body {
      background: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>

  <!-- Forced Viewer Mode Styles Inline to ensure they apply immediately -->
  <style>
    /* The responsive grid and flip logic is now moved to viewer-mode.css for better consolidation */

    /* Emoji Bar */
    .camera-controls-overlay {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20000 !important;
    }

    @media (max-width: 768px) {
      .camera-controls-overlay {
        bottom: 80px;
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    .emoji-bar {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      padding: 5px 10px;
      display: flex;
      gap: 8px;
    }

    .emoji-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .emoji-btn:hover {
      transform: scale(1.2);
    }

    .emoji-btn:active {
      transform: scale(0.9);
    }

    /* Reaction Container & Animation */
    .reaction-container {
      z-index: 21000 !important;
      pointer-events: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .floating-emoji {
      position: absolute;
      bottom: 0;
      font-size: 32px;
      animation: floatUp 3s forwards ease-out;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 1;
        transform: translateY(-50px) scale(1);
      }

      100% {
        transform: translateY(-60vh) scale(1.5);
        opacity: 0;
      }
    }

    /* Host Score Overlay */
    .host-score-overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 15px;
      border-radius: 20px;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      z-index: 20050 !important;
    }

    .score-icon {
      font-size: 18px;
    }

    /* Connection Status */
    .status-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: #666;
      z-index: 20050 !important;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .status-indicator.connected {
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    /* Aggressively hide any leaking controls */
    .controls,
    .ctrl-btn,
    .settings-menu,
    #controlsContainer,
    .ytp-chrome-bottom {
      display: none !important;
    }

    /* Ensure Emoji Bar IS visible though */
    .camera-controls-overlay {
      display: flex !important;
    }

    /* Join & Share Button - Premium Redesign */
    .join-share-btn {
      /* Glassmorphism Base */
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.7) 0%, rgba(118, 75, 162, 0.7) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);

      border-radius: 50px;
      /* Modern Pill Shape */
      padding: 14px 32px;
      color: white;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Inter', sans-serif;

      cursor: pointer;
      display: flex;
      flex-direction: row !important;
      align-items: center;
      justify-content: center;
      gap: 12px;
      white-space: nowrap;

      /* Glowing Shadow */
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.4),
        0 0 15px rgba(102, 126, 234, 0.4);

      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto !important;
      opacity: 0;
      /* FOUC protection */
    }

    .join-share-btn.ready {
      opacity: 1;
    }

    .join-share-btn:hover {
      transform: translateY(-5px) scale(1.05);
      background: linear-gradient(135deg, rgba(118, 75, 162, 0.9) 0%, rgba(102, 126, 234, 0.9) 100%);
      box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5),
        0 0 25px rgba(102, 126, 234, 0.7);
    }

    .join-share-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 4px 15px rgba(31, 38, 135, 0.4);
    }

    .join-share-btn .material-symbols-outlined {
      font-size: 28px;
      filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
    }

    .join-share-btn.copied {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.8);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .join-share-btn.active {
      background: linear-gradient(135deg, #ef4444, #b91c1c) !important;
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.6) !important;
    }
  </style>

  <!-- Agora SDK -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
  <script src="/js/agora-rtm-2.2.0.js"></script>
</head>

<body class="viewer-mode">

      <!-- Remote Videos Container (Host will appear here) -->

      <!-- Host Score Display -->

      <!-- Emoji Controls -->

          <span class="btn-text">Join & Share</span>
        </button>
